<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Personal Course Organizer</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Start Header -->
    <header class="header">
        <div class="container">
            <a href="index.html">
                <img class="logo" src="images/logo.png" alt="Course Organizer Logo">
            </a>
            <nav class="links">
                <span class="icon">
                    <span></span>
                    <span></span>
                    <span></span>
                </span>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="my_courses.html">My Courses</a></li>
                    <li><a href="add_course.html">Add Course</a></li>
                    <li><a href="contact_us.html">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <!-- End Header -->

    <main>
        <section class="section">
            <h1>Contact Us</h1>
            <div class="contact-us">
                <form>
                    <div>
                        <label>Name:</label>
                        <input type="text" placeholder="Enter your name"><br><br>
                    </div>
                    <div>
                        <label>Number:</label>
                        <input type="text" placeholder="+20xxxxxxxxx"><br><br>
                    </div>
                    <div>
                        <label>Email:</label>
                        <input type="email" placeholder="Enter your email"><br><br>
                    </div>
                    <div>
                        <label>Message:</label><br>
                        <textarea rows="6" cols="55" placeholder="Enter your message"></textarea><br><br>
                    </div>
                    <div>
                        <button type="submit">Send</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Zeyad Mohamed (Course Organizer). All rights reserved.</p>
    </footer>
</body>
